<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowSchool — Anmelden</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

    .login-wrap {
      width: 100%; max-width: 440px;
      animation: fadeUp .45s ease;
    }
    .login-logo {
      text-align: center; margin-bottom: 36px;
    }
    .login-logo__mark {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 2.2rem;
      background: linear-gradient(135deg, #7c6aff, #ff6a9e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-logo__sub { color: var(--muted); font-size: .9rem; margin-top: 4px; }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    /* ── Role picker ── */
    .role-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .role-pick-btn {
      padding: 28px 16px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
    }
    .role-pick-btn:hover {
      border-color: var(--purple);
      background: rgba(124,106,255,.08);
      transform: translateY(-2px);
    }
    .role-pick-btn__emoji { font-size: 2.6rem; display: block; margin-bottom: 10px; }
    .role-pick-btn__name  { font-weight: 700; font-size: 1.05rem; color: var(--text); }
    .role-pick-btn__sub   { font-size: .8rem; color: var(--muted); margin-top: 4px; }

    /* ── Auth form ── */
    .form-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px;
    }
    .form-back {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.2rem; padding: 4px 6px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      line-height: 1;
    }
    .form-back:hover { color: var(--text); background: var(--bg2); }
    .form-role-badge {
      font-size: .8rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: rgba(124,106,255,.15); color: var(--purple);
    }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }

    .tab-bar {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 11px; text-align: center;
      font-weight: 600; font-size: .9rem;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: var(--transition);
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

    .error-msg {
      background: rgba(255,106,158,.1);
      border: 1px solid rgba(255,106,158,.3);
      border-radius: var(--radius-sm);
      color: var(--pink);
      padding: 10px 14px;
      font-size: .875rem;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      background: rgba(106,255,204,.1);
      border: 1px solid rgba(106,255,204,.3);
      border-radius: var(--radius-sm);
      color: var(--green);
      padding: 10px 14px;
      font-size: .875rem;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg.visible { display: block; }
  </style>
</head>
<body>
  <div id="page-loader">
    <div class="spinner spinner-lg"></div>
  </div>

  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo__mark">FlowSchool</div>
      <div class="login-logo__sub">Lernen, das Spaß macht ✨</div>
    </div>

    <div class="login-card">

      <!-- ── STEP 1: Role picker ── -->
      <div id="view-role-pick">
        <p style="text-align:center; color:var(--muted); font-size:.9rem; margin-bottom:22px;">Wer bist du?</p>
        <div class="role-pick">
          <button class="role-pick-btn" id="pick-child">
            <span class="role-pick-btn__emoji">🧑‍🚀</span>
            <div class="role-pick-btn__name">Kind</div>
            <div class="role-pick-btn__sub">Ich lerne</div>
          </button>
          <button class="role-pick-btn" id="pick-parent">
            <span class="role-pick-btn__emoji">👨‍💼</span>
            <div class="role-pick-btn__name">Elternteil</div>
            <div class="role-pick-btn__sub">Übersicht & Einstellungen</div>
          </button>
        </div>
      </div>

      <!-- ── STEP 2: Login / Register form ── -->
      <div id="view-auth" style="display:none">

        <div id="error-msg"   class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <!-- Tab bar -->
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-login">Anmelden</button>
          <button class="tab-btn" id="tab-register">Registrieren</button>
        </div>

        <!-- ── LOGIN VIEW ── -->
        <div id="view-login">
          <div class="form-header">
            <button class="form-back" id="back-from-login" title="Zurück">←</button>
            <span id="login-role-badge" class="form-role-badge"></span>
          </div>
          <form id="login-form">
            <div class="form-group">
              <label class="form-label" for="email">E-Mail</label>
              <input class="input" type="email" id="email" placeholder="deine@email.de" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Passwort</label>
              <input class="input" type="password" id="password" placeholder="••••••••" required />
            </div>
            <button class="btn btn-primary btn-lg w-full" type="submit" id="login-btn">
              <span id="login-btn-text">Anmelden</span>
              <span id="login-spinner" class="spinner hidden" style="width:18px;height:18px;border-width:2px"></span>
            </button>
          </form>
        </div>

        <!-- ── REGISTER VIEW ── -->
        <div id="view-register" style="display:none">
          <div class="form-header">
            <button class="form-back" id="back-from-register" title="Zurück">←</button>
            <span id="register-role-badge" class="form-role-badge"></span>
          </div>
          <form id="register-form">
            <div class="form-group">
              <label class="form-label" for="reg-name">Name</label>
              <input class="input" type="text" id="reg-name" placeholder="z.B. Leon oder Papa" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-email">E-Mail</label>
              <input class="input" type="email" id="reg-email" placeholder="deine@email.de" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-password">Passwort</label>
              <input class="input" type="password" id="reg-password" placeholder="Mindestens 6 Zeichen" minlength="6" required />
            </div>
            <button class="btn btn-primary btn-lg w-full" type="submit" id="register-btn">
              <span id="register-btn-text">Konto erstellen</span>
              <span id="register-spinner" class="spinner hidden" style="width:18px;height:18px;border-width:2px"></span>
            </button>
          </form>
        </div>

      </div><!-- /view-auth -->

    </div><!-- /login-card -->
  </div>

  <!-- ── DEV quick-access (remove before launch) ── -->
  <div style="position:fixed;bottom:16px;right:16px;z-index:999">
    <details style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:.78rem;color:var(--muted)">
      <summary style="cursor:pointer;font-weight:600;list-style:none">🧪 Dev-Zugänge</summary>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
        <button onclick="devLogin('lenny@flowschool.app','Lenny123!')" style="background:rgba(124,106,255,.15);border:1px solid var(--purple);border-radius:6px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:.78rem;text-align:left">🧑‍🚀 Lenny (Kind)</button>
        <button onclick="devLogin('test@flowschool.app','Test123!')" style="background:rgba(124,106,255,.15);border:1px solid var(--purple);border-radius:6px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:.78rem;text-align:left">🧪 Testuser (Kind)</button>
        <button onclick="devLogin('mike@flowschool.app','Mike123!')" style="background:rgba(255,106,158,.1);border:1px solid var(--pink);border-radius:6px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:.78rem;text-align:left">👨‍💼 Mike (Eltern)</button>
      </div>
    </details>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    initLogin();
    async function devLogin(email, pw) {
      const sb = await getSupabase();
      const { error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (!error) await redirectByRole(sb);
    }
  </script>
</body>
</html>
